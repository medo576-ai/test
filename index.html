<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Frame AR Viewer</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer"></script>
</head>
<body>
    <input type="file" id="upload" accept="image/*" />
    
    <model-viewer 
        id="frameViewer"
        src="https://res.cloudinary.com/dwc7ebhc5/image/upload/v1737149885/black_3d_frame_model_ayjd5j.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        interaction-prompt="none" 
        style="width: 100%; height: 600px;">
    </model-viewer>

    <script>
        document.getElementById("upload").addEventListener("change", function (event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function () {
                    const modelViewer = document.getElementById("frameViewer");
                    modelViewer.querySelectorAll("img")[0].src = reader.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
