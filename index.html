<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame AR Viewer</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer"></script>
</head>
<body>
